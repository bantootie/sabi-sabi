<!DOCTYPE html>
<html lang="tl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ikwento mo</title>
  <link href="https://fonts.googleapis.com/css2?family=Jolly+Lodger&family=Kode+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0a;--fg:#dedede;--dim:#555;--purple:#8b5cf6;
      --mono:"Kode Mono",monospace;--display:"Jolly Lodger",cursive;
      --hero-h:52vh;
    }
    html,body{background:var(--bg);color:var(--fg);font-family:var(--mono);height:100%;overflow:hidden}
    .top-nav{position:fixed;top:16px;right:20px;z-index:300}
    .cta-btn{background:transparent;border:1.5px solid rgba(255,255,255,0.35);color:var(--fg);font-family:var(--mono);font-size:11px;letter-spacing:0.06em;padding:10px 20px;border-radius:3px;cursor:pointer;transition:border-color .2s;white-space:nowrap}
    .cta-btn:hover{border-color:rgba(255,255,255,0.7)}
    .hero{position:fixed;top:0;left:0;right:0;height:var(--hero-h);z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center}
    .logo-bar{padding:24px 0 0;text-align:center;flex-shrink:0}
    .logo{font-family:var(--display);font-size:clamp(42px,7vw,66px);letter-spacing:0.04em;color:#fff;line-height:1}
    .logo-disclaimer{font-size:16px;color:var(--dim);letter-spacing:0.04em;margin-top:6px}
    .map-stage{position:relative;width:100vw;flex:1;overflow:hidden;background:var(--bg)}
    .fake-map{position:absolute;width:160vw;height:auto;top:50%;left:50%;transform:translate(-50%,-50%);transition:transform 1.2s cubic-bezier(0.65,0,0.35,1);will-change:transform;user-select:none;pointer-events:none;opacity:0.75}
    .spotlight-mask{position:absolute;inset:0;background:var(--bg);-webkit-mask-image:radial-gradient(ellipse 36% 55% at 50% 50%,transparent 52%,rgba(0,0,0,0.55) 70%,black 88%);mask-image:radial-gradient(ellipse 36% 55% at 50% 50%,transparent 52%,rgba(0,0,0,0.55) 70%,black 88%);pointer-events:none;z-index:2}
    .edge-fade{position:absolute;inset:0;background:linear-gradient(to bottom,var(--bg) 0%,transparent 18%,transparent 72%,var(--bg) 100%),linear-gradient(to right,var(--bg) 0%,transparent 14%,transparent 86%,var(--bg) 100%);z-index:3;pointer-events:none}
    .map-bottom-fade{position:absolute;bottom:0;left:0;right:0;height:64px;background:linear-gradient(transparent,var(--bg));z-index:4;pointer-events:none}
    .pin-wrap{position:absolute;left:50%;top:50%;transform:translate(-50%,-100%);z-index:10;pointer-events:none;display:flex;flex-direction:column;align-items:center}
    .pin-img{width:clamp(36px,5vw,52px);height:auto;mix-blend-mode:screen;animation:bounce 2.6s ease-in-out infinite}
    @keyframes bounce{0%,100%{transform:translateY(0)}45%{transform:translateY(-9px)}65%{transform:translateY(-6px)}}
    .pin-shadow{width:14px;height:5px;background:rgba(255,255,255,0.1);border-radius:50%;filter:blur(3px);margin-top:-1px;animation:shadow-shrink 2.6s ease-in-out infinite}
    @keyframes shadow-shrink{0%,100%{transform:scaleX(1);opacity:0.7}45%{transform:scaleX(0.5);opacity:0.25}}
    .coord-label{position:absolute;bottom:12px;right:14px;font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:0.1em;z-index:10;font-family:var(--mono)}
    .scroll-panel{position:fixed;top:var(--hero-h);left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;z-index:50;-webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 32px);mask-image:linear-gradient(to bottom,transparent 0%,black 32px)}
    .scroll-panel::-webkit-scrollbar{width:3px}
    .scroll-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
    .scroll-inner{max-width:600px;margin:0 auto;padding:8px 28px 80px}
    .stories{display:flex;flex-direction:column}
    .story{padding:20px 0;border-bottom:1px solid rgba(255,255,255,0.07);cursor:pointer;transition:opacity 0.15s}
    .story:first-child{border-top:1px solid rgba(255,255,255,0.07)}
    .story:hover{opacity:0.85}
    .story.active{opacity:1;cursor:default}
    .story-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
    .arrow{color:var(--dim);font-size:14px;flex-shrink:0}
    .story.active .arrow{color:rgba(255,255,255,0.5)}
    .handle{font-size:13px;font-weight:700;letter-spacing:0.05em;color:var(--dim);transition:color 0.3s}
    .story.active .handle{color:#fff}
    .story-coords{font-size:11px;color:var(--purple);letter-spacing:0.06em;padding-left:22px;margin-bottom:10px;opacity:0.85}
    .story-body{padding-left:22px;font-size:12px;line-height:1.85;color:#bbb}
    .story.active .story-body{color:#ccc}
    .story-body p+p{margin-top:10px}
    .submit-overlay{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;background:var(--bg);transform:translateY(100%);transition:transform 0.45s cubic-bezier(0.65,0,0.35,1);overflow:hidden}
    .submit-overlay.open{transform:translateY(0)}
    .overlay-topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 12px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.07)}
    .overlay-title{font-family:var(--display);font-size:28px;color:#fff;letter-spacing:0.03em}
    .overlay-close{background:transparent;border:1.5px solid rgba(255,255,255,0.3);color:var(--fg);font-family:var(--mono);font-size:11px;letter-spacing:0.06em;padding:8px 16px;border-radius:3px;cursor:pointer}
    .overlay-body{flex:1;overflow-y:auto;padding:24px 24px 40px;max-width:600px;width:100%;margin:0 auto}
    .handle-display{margin-bottom:24px}
    .handle-label{font-size:10px;color:var(--dim);letter-spacing:0.1em;margin-bottom:6px}
    .handle-value{font-size:14px;font-weight:700;color:var(--purple);letter-spacing:0.05em}
    .field{margin-bottom:20px}
    .field-label{font-size:10px;color:var(--dim);letter-spacing:0.1em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .field-label span.req{color:var(--purple)}
    .field-textarea{width:100%;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.12);border-radius:3px;color:var(--fg);font-family:var(--mono);font-size:12px;line-height:1.75;padding:14px;resize:vertical;min-height:160px;outline:none;transition:border-color .2s;caret-color:var(--purple)}
    .field-textarea:focus{border-color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.06)}
    .field-textarea::placeholder{color:var(--dim)}
    .city-search-wrap{position:relative}
    .field-input{width:100%;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.12);border-radius:3px;color:var(--fg);font-family:var(--mono);font-size:12px;padding:12px 14px;outline:none;transition:border-color .2s;caret-color:var(--purple)}
    .field-input:focus{border-color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.06)}
    .field-input::placeholder{color:var(--dim)}
    .city-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#141414;border:1.5px solid rgba(255,255,255,0.12);border-radius:3px;max-height:200px;overflow-y:auto;z-index:10;display:none}
    .city-dropdown.visible{display:block}
    .city-option{padding:10px 14px;font-size:12px;color:var(--fg);cursor:pointer;transition:background .15s}
    .city-option:hover{background:rgba(255,255,255,0.06)}
    .city-option .city-coords{font-size:10px;color:var(--purple);margin-top:2px}
    .city-selected{margin-top:8px;font-size:11px;color:var(--purple);letter-spacing:0.06em;min-height:16px}
    .review-notice{background:rgba(255,60,60,0.07);border:1px solid rgba(255,80,80,0.3);border-radius:3px;padding:12px 14px;font-size:11px;color:rgba(255,120,120,0.9);letter-spacing:0.04em;line-height:1.6;margin-bottom:20px;display:none}
    .review-notice.visible{display:block}
    .submit-btn{width:100%;background:transparent;border:1.5px solid rgba(255,255,255,0.35);color:var(--fg);font-family:var(--mono);font-size:12px;letter-spacing:0.08em;padding:14px;border-radius:3px;cursor:pointer;transition:border-color .2s;margin-top:8px}
    .submit-btn:hover:not(:disabled){border-color:rgba(255,255,255,0.75)}
    .submit-btn:disabled{opacity:0.35;cursor:not-allowed}
    .success-screen{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 24px;text-align:center;gap:14px}
    .success-screen.visible{display:flex}
    .success-icon{font-size:36px;opacity:0.6}
    .success-title{font-family:var(--display);font-size:32px;color:#fff;letter-spacing:0.03em}
    .success-sub{font-size:11px;color:var(--dim);letter-spacing:0.06em;line-height:1.7}
    .success-back{margin-top:12px;background:transparent;border:1.5px solid rgba(255,255,255,0.3);color:var(--fg);font-family:var(--mono);font-size:11px;letter-spacing:0.06em;padding:11px 32px;border-radius:3px;cursor:pointer}
  </style>
</head>
<body>

<div class="top-nav">
  <button class="cta-btn" id="ctaBtn">may kwento ka rin?</button>
</div>

<div class="submit-overlay" id="submitOverlay">
  <div class="overlay-topbar">
    <div class="overlay-title">ikwento mo</div>
    <button class="overlay-close" id="overlayClose">&#x2715; isara</button>
  </div>
  <div class="overlay-body" id="overlayBody">
    <div class="handle-display">
      <div class="handle-label">IYONG PANGALAN</div>
      <div class="handle-value" id="assignedHandle">&#8212;</div>
    </div>
    <div class="field">
      <div class="field-label">KWENTO MO <span class="req">*</span></div>
      <textarea class="field-textarea" id="storyText" placeholder="isulat mo dito ang iyong karanasan..."></textarea>
    </div>
    <div class="field">
      <div class="field-label">LUNGSOD / BAYAN <span class="req">*</span></div>
      <div class="city-search-wrap">
        <input class="field-input" id="cityInput" type="text" placeholder="i-type ang lungsod o bayan..." autocomplete="off"/>
        <div class="city-dropdown" id="cityDropdown"></div>
      </div>
      <div class="city-selected" id="citySelected"></div>
    </div>
    <div class="review-notice" id="reviewNotice">&#9888; bawal magbanggit ng pangalan ng lugar, tao, o negosyo</div>
    <button class="submit-btn" id="submitBtn" disabled>isumite ang kwento</button>
  </div>
  <div class="success-screen" id="successScreen">
    <div class="success-icon">&#128065;</div>
    <div class="success-title">salamat.</div>
    <div class="success-sub" id="successSub"></div>
    <button class="success-back" id="successBack">bumalik</button>
  </div>
</div>

<div class="hero">
  <div class="logo-bar">
    <div class="logo">ikwento mo</div>
    <div class="logo-disclaimer">Anonymous ang mga kwentong ito. Tinatayang lokasyon lamang.</div>

const DEFAMATION_PATTERNS = [
  // Accusatory verbs paired with a subject
  /\b(nagnakaw|nagnanakaw|magnanakaw|nandaya|mandadaya|manloloko|nanloko|nanloloko|nandamay|nag-abuso|nang-abuso|nang-rape|nangrape|nagbenta ng droga|nagbebenta ng droga|pusher|holdaper|holdupper|mamamatay tao|sinaktan|niloko|dinahas|ginahasa|inabuso|pinagsamantalahan)\b/i,
  // English accusatory
  /\b(scammer|scam|swindler|fraud|fraudster|thief|rapist|murderer|killer|drug dealer|drug lord|pusher|molester|abuser|harasser)\b/i,
  // "ang [Business/Person] ay [accusation]" constructions
  /\b(ay |is a |is an )(scammer|fraud|manloloko|magnanakaw|pusher|rapist|murderer|corrupt)\b/i,
  // Direct accusation with "siya" or "sila"
  /\b(siya|sila|niya|nila)\s+(ay\s+)?(nagnakaw|nanloko|nandaya|nag-abuso|nagbenta ng droga)\b/i,
  // "don't go to" / "iwasan" + place/name
  /\b(iwasan|huwag pumunta sa|huwag bumili sa|don't go to|avoid|beware of|stay away from)\b/i,
];


const PH_PLACE_NAMES = PH_CITIES.map(c => c.name.toLowerCase());
const ALL_PLACES_SET = new Set([...PH_PLACE_NAMES, ...EXTRA_PLACES]);

function scanBusinessNames(lower) {
  for (const biz of BUSINESS_NAMES) {
    const idx = lower.indexOf(biz);
    if (idx === -1) continue;
    const before = idx === 0 ? ' ' : lower[idx-1];
    const after  = idx+biz.length >= lower.length ? ' ' : lower[idx+biz.length];
    if (/[^a-z0-9]/.test(before) && /[^a-z0-9]/.test(after)) return true;
  }
  return false;
}

function hasPII(text) {
  const lower = text.toLowerCase();
  if (/\b(blk|block|lot|unit|floor|flr|brgy|barangay|purok|sitio|subdivision|subd|village|vill|avenue|ave|boulevard|blvd|street|road|highway|corner|phase|compound|drive)\b/i.test(text)) return true;
  if (/\b\d{1,5}\s+[A-Za-z]{3,}/.test(text)) return true;
  if (/\b(1[0-9]{3}|[2-9][0-9]{3})\b/.test(text)) return true;
  if (/\b(09|\+639)\d{9}\b/.test(text)) return true;
  if (/@[a-zA-Z0-9_.]{3,}/.test(text)) return true;
  for (const place of ALL_PLACES_SET) {
    const idx = lower.indexOf(place);
    if (idx === -1) continue;
    const before = idx === 0 ? ' ' : lower[idx-1];
    const after  = idx+place.length >= lower.length ? ' ' : lower[idx+place.length];
    if (/[^a-z0-9]/.test(before) && /[^a-z0-9]/.test(after)) return true;
  }
  if (scanBusinessNames(lower)) return true;
  if (DEFAMATION_PATTERNS.some(p => p.test(text))) return true;
  if (/\b(si|ni|kay|nina|sina)\s+[A-Za-z]{2,}/i.test(text)) return true;
  if (/(?<=[a-z,;:\s])\b[A-Z][a-z]{1,}\s+[A-Z][a-z]{1,}\b/.test(text)) return true;
  if (/\b(sa|nasa|dito sa|doon sa|malapit sa|tabi ng|likod ng|harap ng)\s+[A-Za-z]{4,}/i.test(text)) return true;
  return false;
}

/* MAP */
const fakeMap     = document.getElementById('fakeMap');
const coordLabel  = document.getElementById('coordLabel');
const storiesCont = document.getElementById('storiesContainer');
const scrollPanel = document.getElementById('scrollPanel');

function panMap(offset) {
  fakeMap.style.transform = `translate(calc(-50% + ${offset.x}px), calc(-50% + ${offset.y}px))`;
}

let active = -1;
function activate(index) {
  if (index === active) return;
  active = index;
  const e = ENTRIES[index];
  panMap(e.mapOffset);
  coordLabel.textContent = e.coords;
  document.querySelectorAll('.story').forEach((el,i) => el.classList.toggle('active', i===index));
}

function buildStories() {
  storiesCont.innerHTML = '';
  ENTRIES.forEach((entry, i) => {
    const div = document.createElement('div');
    div.className = 'story';
    div.dataset.index = i;
    div.innerHTML = `
      <div class="story-header"><span class="arrow">-></span><span class="handle">${entry.handle}</span></div>
      <div class="story-coords">${entry.coords}</div>
      <div class="story-body">${entry.text.map(p=>`<p>${p}</p>`).join('')}</div>`;
    div.addEventListener('click', () => activate(i));
    storiesCont.appendChild(div);
  });
  document.querySelectorAll('.story').forEach(el => observer.observe(el));
  if (ENTRIES.length) activate(0);
}

const observer = new IntersectionObserver(entries => {
  let best = null, bestRatio = 0;
  entries.forEach(e => { if (e.intersectionRatio > bestRatio) { bestRatio = e.intersectionRatio; best = e.target; }});
  if (best) activate(parseInt(best.dataset.index, 10));
}, { root: scrollPanel, threshold: [0.2,0.5,0.8], rootMargin: '0px 0px -20% 0px' });

buildStories();

/* FORM */
const ctaBtn         = document.getElementById('ctaBtn');
const submitOverlay  = document.getElementById('submitOverlay');
const overlayClose   = document.getElementById('overlayClose');
const overlayBody    = document.getElementById('overlayBody');
const assignedHandle = document.getElementById('assignedHandle');
const storyText      = document.getElementById('storyText');
const cityInput      = document.getElementById('cityInput');
const cityDropdown   = document.getElementById('cityDropdown');
const citySelected   = document.getElementById('citySelected');
const reviewNotice   = document.getElementById('reviewNotice');
const submitBtn      = document.getElementById('submitBtn');
const successScreen  = document.getElementById('successScreen');
const successSub     = document.getElementById('successSub');
const successBack    = document.getElementById('successBack');

let selectedCity = null;

function randomHandle() {
  return FOOD_HANDLES[Math.floor(Math.random() * FOOD_HANDLES.length)];
}

function openOverlay() {
  assignedHandle.textContent = randomHandle();
  selectedCity = null;
  citySelected.textContent = '';
  cityInput.value = '';
  storyText.value = '';
  reviewNotice.classList.remove('visible');
  submitBtn.disabled = true;
  successScreen.classList.remove('visible');
  overlayBody.style.display = '';
  submitOverlay.classList.add('open');
  setTimeout(() => storyText.focus(), 460);
}
function closeOverlay() { submitOverlay.classList.remove('open'); }

ctaBtn.addEventListener('click', openOverlay);
overlayClose.addEventListener('click', closeOverlay);

cityInput.addEventListener('input', () => {
  const q = cityInput.value.trim().toLowerCase();
  if (q.length < 2) { cityDropdown.classList.remove('visible'); return; }
  const matches = PH_CITIES.filter(c => c.name.toLowerCase().includes(q)).slice(0,8);
  if (!matches.length) { cityDropdown.classList.remove('visible'); return; }
  cityDropdown.innerHTML = matches.map(c => `
    <div class="city-option" data-name="${c.name}" data-coords="${c.coords}">
      ${c.name}<div class="city-coords">${c.coords}</div>
    </div>`).join('');
  cityDropdown.classList.add('visible');
});

cityDropdown.addEventListener('click', e => {
  const opt = e.target.closest('.city-option');
  if (!opt) return;
  selectedCity = { name: opt.dataset.name, coords: opt.dataset.coords };
  cityInput.value = selectedCity.name;
  citySelected.textContent = selectedCity.coords;
  cityDropdown.classList.remove('visible');
  validateForm();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.city-search-wrap')) cityDropdown.classList.remove('visible');
});

storyText.addEventListener('input', validateForm);

function validateForm() {
  const hasStory = storyText.value.trim().length > 10;
  const hasCity  = !!selectedCity;
  const pii      = hasPII(storyText.value);
  reviewNotice.classList.toggle('visible', pii && hasStory);
  submitBtn.disabled = !(hasStory && hasCity && !pii);
}

/* ── Submit to Formspree → lands in your email ── */
submitBtn.addEventListener('click', async () => {
  if (submitBtn.disabled) return;
  if (hasPII(storyText.value)) return;

  submitBtn.disabled = true;
  submitBtn.textContent = 'ipinapadala...';

  const handle = assignedHandle.textContent;
  const rx = Math.round((Math.random()-0.5)*200);
  const ry = Math.round((Math.random()-0.5)*160);

  const payload = {
    handle,
    city:   selectedCity.name,
    coords: selectedCity.coords,
    story:  storyText.value.trim(),
    _subject: `[ikwento mo] bagong kwento — ${handle} (${selectedCity.name})`,
    /* ── COPY THIS BLOCK INTO ENTRIES IN index.html TO APPROVE ── */
    entry_to_add: `  {\n    handle: "${handle}",\n    coords: "${selectedCity.coords}",\n    mapOffset: { x: ${rx}, y: ${ry} },\n    text: [${JSON.stringify(storyText.value.trim())}]\n  },`,
  };

  try {
    const res  = await fetch(FORMSPREE_ENDPOINT, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body:    JSON.stringify(payload),
    });
    if (res.ok) {
      overlayBody.style.display = 'none';
      successScreen.classList.add('visible');
      successSub.textContent = `Natanggap ang iyong kwento bilang "${handle}". Ipapakita ito pagkatapos ng pagsusuri.`;
    } else {
      submitBtn.disabled = false;
      submitBtn.textContent = 'isumite ang kwento';
      alert('May problema sa pagpapadala. Subukan muli.');
    }
  } catch(err) {
    submitBtn.disabled = false;
    submitBtn.textContent = 'isumite ang kwento';
    alert('Hindi maabot ang server. Subukan muli.');
  }
});

successBack.addEventListener('click', closeOverlay);
</script>
